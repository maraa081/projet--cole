<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="icon" href="/ecole/assets/logo.jpg" type="image/jpeg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ecole/css/style.css">
  <style>
    .sql-editor {
      width: 100%;
      min-height: 120px;
      background: #1a1a2e;
      color: #e8e8ff;
      border: 1px solid rgba(108,92,231,0.3);
      border-radius: var(--radius-sm);
      padding: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      resize: vertical;
      margin-bottom: 0.75rem;
    }
    .sql-editor:focus { outline: none; border-color: var(--accent); }
    .sql-result { overflow-x: auto; margin-top: 1rem; }
    .sql-result table { font-size: 0.85rem; }
    .sql-result td, .sql-result th { padding: 0.5rem 0.75rem; }
    .schema-table {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.75rem;
      overflow: hidden;
    }
    .schema-table summary {
      padding: 0.75rem 1rem;
      cursor: pointer;
      font-weight: 600;
      background: var(--bg-alt);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .schema-table summary:hover { background: rgba(108,92,231,0.05); }
    .schema-table .col-info {
      padding: 0.4rem 1rem 0.4rem 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      display: flex;
      gap: 1rem;
    }
    .schema-table .col-info .type { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
    .schema-table .col-info .key { color: var(--warning); font-size: 0.75rem; }
    .query-time { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/ecole/" class="logo" style="display:flex;align-items:center;gap:8px"><img src="/ecole/assets/logo.jpg" style="height:28px;width:28px;border-radius:6px;object-fit:cover">Smart<span>Vend</span></a>
    <ul class="nav-links">
      <li><a href="/ecole/">Accueil</a></li>
      <li><a href="/ecole/bdd" class="active">BDD</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1>Base partagee MySQL</h1>
    <p>mysql.mrlojnat.fr:3306 — utilisateur: g3d</p>
  </div>

  <div style="max-width:1200px;margin:0 auto;padding:2rem">
    <!-- Schema + donnees -->
    <div style="display:grid;grid-template-columns: 300px 1fr;gap:1.5rem">
      <!-- Left: Schema -->
      <div>
        <h3 style="margin-bottom:1rem;font-size:1rem">Tables</h3>
        <div id="schema-list"></div>
        <button class="btn btn-secondary" onclick="loadSchema()" style="width:100%;margin-top:0.5rem">Rafraichir</button>
      </div>

      <!-- Right: SQL + data -->
      <div>
        <div class="chart-container">
          <h3>SQL Query</h3>
          <textarea class="sql-editor" id="sql-input" placeholder="SELECT * FROM temperature_humidite ORDER BY timestamp DESC LIMIT 50">SELECT * FROM temperature_humidite ORDER BY timestamp DESC</textarea>
          <div style="display:flex;gap:0.5rem">
            <button class="btn btn-primary" onclick="runQuery()">Executer</button>
            <button class="btn btn-secondary" onclick="document.getElementById('sql-input').value='SHOW TABLES';runQuery()">SHOW TABLES</button>
            <button class="btn btn-secondary" onclick="document.getElementById('sql-input').value='SELECT * FROM temperature_humidite ORDER BY timestamp DESC LIMIT 20';runQuery()">Temperatures</button>
            <button class="btn btn-secondary" onclick="document.getElementById('sql-input').value='SELECT * FROM luminosite ORDER BY timestamp DESC LIMIT 20';runQuery()">Luminosite</button>
          </div>
          <div id="sql-result" class="sql-result"></div>
          <div id="query-time" class="query-time"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/ecole/js/mysql-admin.js"></script>
</body>
</html>
