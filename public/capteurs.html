<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/ecole/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/ecole/" class="logo">Smart<span>Vend</span></a>
        <ul class="nav-links">
            <li><a href="/ecole/">Accueil</a></li>
            <li><a href="/ecole/distributeur">Distributeur 3D</a></li>
            <li><a href="/ecole/capteurs" class="active">Capteurs</a></li>
            <li><a href="/ecole/admin">Admin</a></li>
        </ul>
    </nav>

    <div class="page-header">
        <h1>Capteurs</h1>
        <p>Donnees en temps reel — Capteur SGP30 (Gaz / CO2) + groupes</p>
    </div>

    <div style="max-width:1100px;margin:0 auto;padding:2rem">
        <!-- SGP30 Live -->
        <div class="stats-grid" id="sgp30-live"></div>

        <!-- Graphique TVOC / eCO2 -->
        <div class="chart-container">
            <h3>Capteur SGP30 — TVOC et eCO2 (derniere heure)</h3>
            <canvas id="sgp30-chart"></canvas>
        </div>

        <!-- Alertes -->
        <div class="chart-container" id="alertes-section">
            <h3>Alertes gaz</h3>
            <div id="alertes-list"></div>
        </div>

        <!-- Autres groupes -->
        <div class="chart-container">
            <h3>Autres capteurs — groupes</h3>
            <div id="sensors-grid" class="sensors-grid" style="margin-bottom:0"></div>
        </div>
    </div>

    <script src="/ecole/js/capteurs.js"></script>
</body>
</html>
